<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tela de Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Barra superior -->
    <header class="topo">

        <!-- Logo -->
        <div class="logo">
            Le&Souza Veterinaria
        </div>

    </header>

    <!-- Estrutura principal do dashboard -->
    <div class="dashboard">

        <!-- Menu lateral -->
        <aside class="sidebar">

            <h2>Painel</h2>

            <ul>

                <li>Dashboard</li>

                <li>Clientes</li>

                <li>Animais</li>

                <li>Consultas</li>

                <li>Financeiro</li>

            </ul>

        </aside>

        <!-- Conteúdo principal -->
        <section class="conteudo-dashboard">

            <h2>Login</h2>

            <!-- Campo usuário -->
            <input 
                type="text"
                id="usuario"
                placeholder="Usuário"
            >

            <!-- Campo senha -->
            <input 
                type="password"
                id="senha"
                placeholder="Senha"
            >

            <!-- Botão -->
            <button onclick="fazerLogin()">
                Entrar
            </button>

            <!-- Mensagem -->
            <p id="mensagem"></p>

        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
