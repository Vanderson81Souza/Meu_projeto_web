<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- =========================TOPO========================== -->
    <header class="topo">
        <div class="logo">
            Le&Souza Veterinaria
        </div>
    </header>

    <!-- =========================DASHBOARD========================== -->
    <div class="dashboard">

        <!-- =========================SIDEBAR========================== -->
        <aside class="sidebar">
            <h2>Painel</h2>
                <div class="cards">
                <!-- Card -->
                <div class="card">
                    <h3>Clientes</h3>
                    <p>
                    Controle de clientes
                    </p>
                </div>

                <!-- Card -->
                <div class="card">
                    <h3>Animais</h3>
                    <p>
                    Cadastro de animais
                    </p>
                </div>

                <!-- Card -->
                <div class="card">
                    <h3>Consultas</h3>
                    <p>
                    Gerenciamento de consultas
                    </p>
                </div>

                <!-- Card -->
                <div class="card">
                    <h3>Financeiro</h3>
                    <p>
                    Controle financeiro
                    </p>
                </div>

            </div>
            

        </aside>

        <!-- =========================
             CONTEÚDO PRINCIPAL
        ========================== -->
        <section class="conteudo-dashboard">

            </div>

            <!-- =========================
                 ÁREA FUTURA
            ========================== -->
            <div class="area-conteudo">

                <h2>Área de Conteúdo</h2>

                <p>
                    Aqui serão abertas as telas do sistema futuramente.
                </p>

            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
