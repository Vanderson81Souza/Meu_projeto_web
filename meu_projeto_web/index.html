<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- =========================TOPO========================== -->
    <header class="topo">
        <div class="logo">
            Clinica Veterinaria
        </div>
    </header>

    <!-- =========================DASHBOARD========================== -->
    <div class="dashboard">

        <!-- =========================SIDEBAR========================== -->
        <nav class="sidebar">
            <h2>Você e capaz</h2>
                <div class="cards" >
                <!-- Card -->
                <div class="card" data-section="animais">
                    <h3>Cadastro de Animais</h3>
                </div>

                <!-- Card -->
                <div class="card" data-section="clientes">
                    <h3>Registro de Serviços</h3>
                </div>

                <!-- Card -->
                <div class="card" data-section="historico">
                    <h3>Historico</h3>
                </div>

                <!-- Card -->
                <div class="card" data-section="financeiro">
                    <h3>Financeiro</h3>
                </div>
            </div>
        </nav>
        <!-- ==================CONTEÚDO PRINCIPAL========================== -->
        <section class="conteudo-dashboard" id="conteudo">
            <h2>Selecione uma opção no menu lateral</h2>
            
        </section>

        
        
    </div>

    <script src="script.js"></script>

</body>
</html>
